# L4 测试服务：nginx (调度到 worker1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-l4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-l4
  template:
    metadata:
      labels:
        app: nginx-l4
    spec:
      nodeSelector:
        http-node: "true"
      containers:
      - name: nginx
        image: quay.io/nginx/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-l4
spec:
  selector:
    app: nginx-l4
  ports:
  - port: 8080
---
# L7 测试服务：http-echo (调度到 worker1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-echo-l7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo-l7
  template:
    metadata:
      labels:
        app: http-echo-l7
    spec:
      nodeSelector:
        http-node: "true"
      containers:
      - name: echo
        image: hashicorp/http-echo:latest
        args: ["-text", "Hello from L7 service", "-listen", ":8080"]
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: http-echo-l7
spec:
  selector:
    app: http-echo-l7
  ports:
  - port: 8080
---
# HTTP 客户端 (调度到 control-plane)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: curl
        image: quay.io/cilium/alpine-curl:v1.10.0
        command: ["/bin/sh", "-c"]
        args:
        - |
          while true; do
            curl -s http://nginx-l4:8080 > /dev/null
            curl -s -X GET http://http-echo-l7:8080 > /dev/null
            curl -s -X POST http://http-echo-l7:8080 > /dev/null
            sleep 3
          done
---
# gRPC 服务端 (调度到 worker2)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-server
  template:
    metadata:
      labels:
        app: grpc-server
    spec:
      nodeSelector:
        grpc-node: "true"
      containers:
      - name: server
        image: docker.io/moul/grpcbin:latest
        ports:
        - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-server
spec:
  selector:
    app: grpc-server
  ports:
  - name: grpc
    port: 9000
    targetPort: 9000
---
# gRPC 客户端 (调度到 control-plane)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-client
  template:
    metadata:
      labels:
        app: grpc-client
    spec:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: client
        image: my-grpcurl:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - |
          while true; do
            grpcurl -plaintext grpc-server:9000 grpcbin.GRPCBin/Echo
            sleep 5
          done
