# L4 测试服务：nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-l4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-l4
  template:
    metadata:
      labels:
        app: nginx-l4
    spec:
      containers:
      - name: nginx
        image: quay.io/nginx/nginx-unprivileged:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-l4
spec:
  selector:
    app: nginx-l4
  ports:
  - port: 8080
---
# L7 测试服务：http-echo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-echo-l7
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo-l7
  template:
    metadata:
      labels:
        app: http-echo-l7
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo:latest
        args: ["-text", "Hello from L7 service", "-listen", ":8080"]
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: http-echo-l7
spec:
  selector:
    app: http-echo-l7
  ports:
  - port: 8080
---
# 客户端：持续发送 HTTP 请求
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: curl
        image: quay.io/cilium/alpine-curl:v1.10.0
        command: ["/bin/sh", "-c"]
        args:
        - |
          while true; do
            curl -s http://nginx-l4:8080 > /dev/null
            curl -s -X GET http://http-echo-l7:8080 > /dev/null
            curl -s -X POST http://http-echo-l7:8080 > /dev/null   # 会被 L7 策略拒绝
            sleep 3
          done
